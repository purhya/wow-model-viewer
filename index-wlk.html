    <script src="./jquery-3.5.1.min.js"></script>

</head>
<body>
    <div id="model_3d" style="width: 512px; height: 512px; background: #555"></div>
	<button>Output</button>
</body>
<script type="module">
	import {generateModels, modelingType} from './index.js'

	// 用于 web 版本测试
	// http://localhost:3178/index-wlk.html

	// const character = {
	//	 "race": 7,
	//	 "gender": 1,
	//	 "skin": 4,
	//	 "face": 0,
	//	 "hairStyle": 5,
	//	 "hairColor": 5,
	//	 "facialStyle": 5,
	//	 "items": [[1, 1170], [3, 4925], [5, 9575], [6, 25235], [7, 2311], [8, 21154], [9, 14618], [10, 9534], [15, 17238], [21, 20379], [22, 28787]]
	// };
	// generateModels(1, `#model_3d`, character);

	window.CONTENT_PATH = `http://localhost:3177/modelviewer/wrath/`

	let displayId = Number(location.hash.slice(1)) || 1350
	await generateModels(1, `#model_3d`, {type: modelingType.NPC, id: displayId});
	model.setAzimuth(-Math.PI * (120/180))
	model.setZenith(Math.PI * (105/180))
	model.method('resetAnimation')
	model.forceTime = 1100

	model.onCompleted = async () => {
		await model.pr.promise
		await model.toCenter(true)
	}

	document.querySelector('button').onclick = async () => {
		let buffer = await model.outputArrayBuffer()
		let blob = new Blob([buffer], { type: 'img/webp' })
		let url = URL.createObjectURL(blob)
		let a = document.createElement('a')

		a.href = url
		a.download = displayId + '.webp'
		document.body.appendChild(a)
		a.click()
		document.body.removeChild(a)
		URL.revokeObjectURL(url)
	}
</script>
