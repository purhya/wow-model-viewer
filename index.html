	window.CONTENT_PATH = `http://localhost:3177/modelviewer/wrath/`

	electron.ipcRenderer.on('start-making-display', async (_event, displayId, type) => {

		if (skipDisplayIds.includes(displayId)) {
			electron.ipcRenderer.send('end-making-display', displayId, null)
			return
		}

		document.querySelector('#message').textContent = `Making display for ${displayId}`

		// 清理上一个 model.
		if (window.model) {
			model.onCompleted = null
			model.destroy()
			model = null
		}

		$('#model_3d').empty()
		await generateModels(1, `#model_3d`, {type: modelingType.NPC, id: IdMap[displayId] ?? displayId})
			
		let json = await getJSON(displayId)
		let modelId = json.Model ?? 0

		// 野兽
		if (type === 1 || beBeastModels.includes(modelId) || beBeastDisplays.includes(displayId)) {
			model.setAzimuth(-Math.PI * (120 / 180))
			model.setZenith(Math.PI * (105 / 180))
		}
		else {
			model.setAzimuth(-Math.PI * (105 / 180))
			model.setZenith(Math.PI * (90 / 180))
		}

		model.method('resetAnimation')

		// 加载完所有资源时触发.
		model.onCompleted = async () => {

			let captureOnEye = (type === 3 || type === 5 || type === 6 || type === 7)
				&& !(forceFullViewDisplays.includes(displayId)
					|| forceFullViewModels.includes(modelId))
				|| forceHalfViewDisplays.includes(displayId)
				|| forceHalfViewModels.includes(modelId)

			let eyePosition = undefined

			if (captureOnEye) {
				if (eyePositionOfModels[modelId]) {
					eyePosition = eyePositionOfModels[modelId]
				}

				if (eyePositionOfDisplays[displayId]) {
					eyePosition = eyePositionOfDisplays[displayId]
				}
			}

			if (modelTimeReset[modelId]) {
				model.forceTime = modelTimeReset[modelId]
			}

			if (displayTimeReset[displayId]) {
				model.forceTime = displayTimeReset[displayId]
			}

			await model.pr.promise
			await new Promise(resolve => setTimeout(resolve, 100))
			await model.toCenter(captureOnEye, eyePosition)
			let buffer = await model.outputBuffer()

			electron.ipcRenderer.send('end-making-display', displayId, buffer)
		}
	})

	async function getJSON(id) {
		try {
			let response = await fetch(CONTENT_PATH + `meta/npc/${id}.json`)
			let json = await response.json()
			return json
		}
		catch (err) {}

		return null
	}

	electron.ipcRenderer.on('start-making-hash', async (_event, id) => {
		let json = await getJSON(id)
		let hash = null

		if (json
			&& json.Model
			&& json.Textures
			&& !json.TextureFiles
			&& !json.Character
			&& !json.Equipment
		) {
			hash = json.Model + '-' + (json.Textures[11] || 0)
		}
 
		electron.ipcRenderer.send('end-making-hash', id, hash)
	})
